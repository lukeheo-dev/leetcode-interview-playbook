name: Auto-generate index.md

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: auto-generate-index-main
  cancel-in-progress: true

jobs:
  generate-index:
    # Avoid infinite loop when the workflow pushes its own commit
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate index.md
        run: python scripts/generate_index.py

      - name: Commit & push if changed
        run: |
          if git diff --quiet -- index.md; then
            echo "No changes to index.md"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.md
          git commit -m "chore: auto-update index"
          git push
